name: 每日AI资讯邮件(Resend)
on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1点（北京时间 9点）发送
  workflow_dispatch:     # 支持手动测试运行

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: cd scripts && npm install

      - name: 安装 Resend 发信SDK
        run: cd scripts && npm install resend

      - name: 运行脚本 + 发送邮件
        run: cd scripts && node index.js
        env:
          # Resend 配置
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "AI资讯 <onboarding@resend.dev>"  # 官方免费发件箱
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
