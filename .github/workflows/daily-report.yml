name: 每日AI资讯邮件(Resend)
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Install Resend
        run: cd scripts && npm install resend

      - name: Run
        run: |
          cd scripts
          node generate-feed.js
          node prepare-digest.js
          node deliver.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "AI资讯 <onboarding@resend.dev>"
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SUPADATA_API_KEY: "dummy"
          X_BEARER_TOKEN: "dummy"
          OPENAI_API_KEY: "dummy"
          ANTHROPIC_API_KEY: "dummy"
          TELEGRAM_BOT_TOKEN: "dummy"
          TELEGRAM_CHAT_ID: "dummy"
