name: 每日AI资讯邮件(Resend)
on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 8点
  workflow_dispatch:     # 手动测试

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装项目依赖
        run: cd scripts && npm install

      - name: 安装 Resend
        run: cd scripts && npm install resend

      - name: 运行并发送邮件
        run: |
          cd scripts
          node generate-feed.js
          node prepare-digest.js
          node deliver.js
        env:
          # 邮件配置（你必须配的）
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "AI资讯 <onboarding@resend.dev>"
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          
          # 👇 就是加这一行，解决报错！
          SUPADATA_API_KEY: "dummy-key-not-used"
